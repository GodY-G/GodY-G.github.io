    <style>
    /* === Premium Overrides === */
    body { font-family: "Inter", -apple-system, "Microsoft YaHei", sans-serif; background: #FAFAFA; }
    .content { padding-top: 0; }
    #header { padding: 56px 0 32px; border: none; }
    #title h1 { font-size: 22px; font-weight: 700; letter-spacing: -.02em; }
    #nav a { font-size: 13px; color: #888; letter-spacing: .01em; padding: 0 10px; }
    #nav a:hover { color: #1A1A1A; }
    .home-arrow { font-size: 14px; margin-right: 6px; opacity: .25; font-weight: 400; }

    /* Home post list */
    #writing .h1 { font-size: 11px; font-weight: 600; color: #B0B0B0; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 28px; display: block; }
    .post-item { margin-bottom: 28px; display: flex; align-items: baseline; gap: 16px; }
    .post-item .meta { flex: 0 0 110px; text-align: right; font-size: 12px; color: #C0C0C0; letter-spacing: .02em; }
    .post-item .article-title { font-size: 15px; font-weight: 500; line-height: 1.45; }
    .post-item .article-title a { color: #2A2A2A; text-decoration: none; transition: opacity .2s; }
    .post-item .article-title a:hover { opacity: .4; }
    .post-item .article-category { font-size: 11px; color: #CCC; letter-spacing: .03em; margin-top: 3px; display: block; }
    .post-item .article-category a { color: #CCC; text-decoration: none; }
    .post-item .article-category a:hover { color: #888; }

    /* Pagination */
    .pagination { margin-top: 40px; padding-top: 16px; border-top: 1px solid #E8E8E8; font-size: 13px; }
    .pagination a { color: #888; }

    /* Search */
    #header-search { text-align: right; margin-top: 4px; }
    #header-search-input { border: none; border-bottom: 1px solid #D0D0D0; background: transparent; font-size: 12px; padding: 4px 0; width: 150px; outline: none; color: #555; font-family: inherit; }
    #header-search-input:focus { border-bottom-color: #1A1A1A; }
    @media (max-width: 600px) { #header-search { display: none; } }

    /* Tags */
    #tags-page {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }
    .tag-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 18px;
      border: 1px solid #E8E8E8; border-radius: 4px;
      text-decoration: none; color: #444;
      font-size: 13px; letter-spacing: .02em;
      transition: all .2s; background: #FFF;
    }
    .tag-item:hover { border-color: #BBB; color: #1A1A1A; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
    .tag-name { font-weight: 500; }
    .tag-count { color: #C0C0C0; font-size: 12px; font-weight: 400; }
    .tag-item:hover .tag-count { color: #999; }
    .tags-link { margin-top: 32px; font-size: 13px; }
    .tags-link a { color: #BBB; text-decoration: none; transition: color .2s; }
    .tags-link a:hover { color: #666; }

    /* === Dashboard === */
    .dashboard { margin-top: 8px; }
    .dash-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 40px; }
    .stat-card { background: #FFF; border: 1px solid #ECECEC; border-radius: 6px; padding: 18px 20px; text-align: center; }
    .stat-num { display: block; font-size: 28px; font-weight: 700; color: #1A1A1A; letter-spacing: -.02em; }
    .stat-label { display: block; font-size: 11px; color: #B0B0B0; letter-spacing: .06em; margin-top: 4px; text-transform: uppercase; }
    .dash-section { margin-bottom: 36px; }
    .dash-h3 { font-size: 11px; font-weight: 600; color: #C0C0C0; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 16px; }
    .dash-posts { display: flex; flex-direction: column; }
    .dash-post { display: flex; gap: 14px; padding: 8px 0; text-decoration: none; border-bottom: 1px solid #F5F5F5; transition: opacity .2s; }
    .dash-post:hover { opacity: .45; }
    .dash-post-date { flex: 0 0 60px; font-size: 12px; color: #C0C0C0; letter-spacing: .02em; padding-top: 1px; }
    .dash-post-title { flex: 1; font-size: 14px; color: #2A2A2A; font-weight: 500; }
    .dash-topics { display: flex; flex-wrap: wrap; gap: 8px; }
    .dash-topic { display: inline-flex; align-items: center; gap: 5px; padding: 6px 14px; background: #FFF; border: 1px solid #ECECEC; border-radius: 4px; text-decoration: none; font-size: 13px; color: #555; transition: all .2s; }
    .dash-topic:hover { border-color: #BBB; color: #1A1A1A; }
    .dash-topic-count { color: #CCC; font-size: 12px; }
    .dash-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .dash-tag { display: inline-block; padding: 4px 10px; font-size: 12px; color: #AAA; text-decoration: none; border-radius: 3px; transition: color .2s; }
    .dash-tag:hover { color: #555; }
    .dash-gh { display: block; border: 1px solid #ECECEC; border-radius: 6px; overflow: hidden; transition: border-color .2s; }
    .dash-gh:hover { border-color: #BBB; }
    .dash-gh-img { width: 100%; display: block; }

    /* === Mermaid fallback === */
    .mermaid { background: #FAFAFA; border: 1px solid #EEE; border-radius: 4px; padding: 20px; overflow-x: auto; min-height: 40px; }
    .mermaid svg { max-width: 100%; }

    /* Typora highlight */
    mark { background: #FFF3A3; color: #333; padding: 1px 3px; border-radius: 2px; }

    /* Post detail */
    .post-back { margin-bottom: 16px; }
    .post-back a {
      display: inline-flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; border-radius: 50%;
      border: 1px solid #DDD; color: #BBB;
      text-decoration: none; font-size: 16px;
      transition: all .2s;
    }
    .post-back a:hover { border-color: #888; color: #555; }

    article.post header .posttitle {
      font-size: 26px; font-weight: 700; letter-spacing: -.03em;
    }
    article.post header .posttitle::after {
      content: ""; display: block;
      width: 50%; height: 2px;
      margin: 32px auto 32px;
      background: #D0D0D0;
      border-radius: 1px;
    }

    article.post .e-content { font-size: 15px; line-height: 1.85; color: #333; }
    article.post .e-content h2 { font-size: 18px; font-weight: 600; margin-top: 36px; }
    article.post .e-content h3 { font-size: 15px; font-weight: 600; }

    /* Post footer */
    .post-footer { margin-top: 48px; padding-top: 20px; border-top: 1px solid #ECECEC; }
    .post-footer .post-meta-bottom { font-size: 13px; color: #B0B0B0; letter-spacing: .02em; }
    .post-footer .post-meta-bottom a { color: #B0B0B0; text-decoration: none; }
    .post-footer .post-meta-bottom a:hover { color: #777; }
    .post-tags-bottom { margin-top: 8px; font-size: 12px; color: #CCC; letter-spacing: .03em; }
    .post-tags-bottom a { color: #CCC; text-decoration: none; margin-right: 8px; }
    .post-tags-bottom a:hover { color: #999; }

    /* Footer */
    .footer { border-top: 1px solid #E8E8E8; padding: 24px 0; color: #B0B0B0; font-size: 12px; margin-top: 48px; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #D0D0D0; border-radius: 2px; }
    </style>
