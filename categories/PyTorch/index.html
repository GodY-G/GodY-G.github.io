<script>
(function(){
  var s = localStorage.getItem('dark-mode');
  if (s === 'true' || (s === null && matchMedia('(prefers-color-scheme: dark)').matches)) {
    document.body.className += ' dark';
  }
  function rdy(fn) { document.readyState !== 'loading' ? fn() : document.addEventListener('DOMContentLoaded', fn); }
  rdy(function(){
    var b = document.getElementById('dark-toggle');
    if (b) b.onclick = function(e){ e.preventDefault(); document.body.classList.toggle('dark'); localStorage.setItem('dark-mode', document.body.classList.contains('dark')); };
  });
})();
</script>
